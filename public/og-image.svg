<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#4B6BFB"/>
  
  <!-- Icon (stacked layers) - centered -->
  <g transform="translate(600, 220)">
    <!-- Layer 1 (top) -->
    <path d="M0 -100 L130 -25 L0 50 L-130 -25 Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="16" 
          stroke-linejoin="round"
          stroke-linecap="round"/>
    
    <!-- Layer 2 (middle) -->
    <path d="M-130 35 L0 110 L130 35" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="16" 
          stroke-linejoin="round"
          stroke-linecap="round"/>
    
    <!-- Layer 3 (bottom) -->
    <path d="M-130 95 L0 170 L130 95" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="16" 
          stroke-linejoin="round"
          stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="520" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" text-anchor="middle">Almox Fácil</text>
</svg>
