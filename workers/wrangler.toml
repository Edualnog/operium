# =============================================================================
# Operium Telemetry Ingest Worker
# =============================================================================
# Recebe eventos de telemetria via HTTP e publica no Queue
# Endpoint: POST /ingest
# =============================================================================

name = "operium-telemetry-ingest"
main = "src/ingest/index.ts"
compatibility_date = "2024-12-26"

# Queue producer - publica eventos para processamento
[[queues.producers]]
queue = "telemetry-events"
binding = "TELEMETRY_QUEUE"

# Variáveis de ambiente
[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.0.0"

# Ambiente de staging
[env.staging]
name = "operium-telemetry-ingest-staging"
vars = { ENVIRONMENT = "staging" }

# Ambiente de desenvolvimento
[env.dev]
name = "operium-telemetry-ingest-dev"
vars = { ENVIRONMENT = "development" }
