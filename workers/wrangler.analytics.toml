# =============================================================================
# Operium Analytics Query Worker
# =============================================================================
# API HTTP para queries no Analytics Engine
# Endpoint: POST /query com corpo SQL
# =============================================================================

name = "operium-analytics-query"
main = "src/analytics/index.ts"
compatibility_date = "2024-12-26"

# Analytics Engine para leitura
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "operium_events"

# Variáveis de ambiente
[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.0.0"

# Ambiente de staging
[env.staging]
name = "operium-analytics-query-staging"
vars = { ENVIRONMENT = "staging", WORKER_VERSION = "1.0.0" }
[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "operium_events_staging"

# Ambiente de desenvolvimento
[env.dev]
name = "operium-analytics-query-dev"
vars = { ENVIRONMENT = "development", WORKER_VERSION = "1.0.0" }
[[env.dev.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "operium_events_dev"
