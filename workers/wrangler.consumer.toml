# =============================================================================
# Operium Telemetry Consumer Worker
# =============================================================================
# Consome eventos do Queue e escreve no R2 + Analytics Engine
# R2: Armazenamento raw para backup e queries históricas
# Analytics Engine: Queries SQL em tempo real para dashboards
# =============================================================================

name = "operium-telemetry-consumer"
main = "src/consumer/index.ts"
compatibility_date = "2024-12-26"

# Queue consumer - processa eventos em batch
[[queues.consumers]]
queue = "telemetry-events"
max_batch_size = 20
max_batch_timeout = 5

# R2 bucket para armazenamento raw
[[r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "operium-telemetry-raw"

# Analytics Engine para queries em tempo real
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "operium_events"

# Variáveis de ambiente
[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.1.0"

# Ambiente de staging
[env.staging]
name = "operium-telemetry-consumer-staging"
vars = { ENVIRONMENT = "staging", WORKER_VERSION = "1.1.0" }
[[env.staging.r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "operium-telemetry-raw-staging"
[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "operium_events_staging"

# Ambiente de desenvolvimento
[env.dev]
name = "operium-telemetry-consumer-dev"
vars = { ENVIRONMENT = "development", WORKER_VERSION = "1.1.0" }
[[env.dev.r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "operium-telemetry-raw-dev"
[[env.dev.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "operium_events_dev"
