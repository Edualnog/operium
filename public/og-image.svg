<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="300" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#6366f1" opacity="0.1"/>
  
  <!-- Icon box -->
  <rect x="100" y="215" width="200" height="200" rx="32" fill="url(#iconGrad)"/>
  
  <!-- Icon (cube) -->
  <g transform="translate(140, 255) scale(0.24)">
    <path d="M250 80 350 130 350 230 250 280 150 230 150 130 250 80Z" fill="none" stroke="#ffffff" stroke-width="16" stroke-linejoin="round"/>
    <path d="M250 80V180" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <path d="M150 130 250 180 350 130" fill="none" stroke="#ffffff" stroke-width="16" stroke-linejoin="round"/>
    <path d="M250 180 250 280" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <path d="M250 180 150 230" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <path d="M250 180 350 230" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="340" y="290" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700">Almox Fácil</text>
  
  <!-- Subtitle -->
  <text x="340" y="360" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="32">Gestão de Almoxarifado Simples e Poderosa</text>
  
  <!-- Features -->
  <g fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="24">
    <text x="340" y="440">✓ Controle de Estoque</text>
    <text x="340" y="480">✓ Gestão de Ferramentas</text>
    <text x="700" y="440">✓ Colaboradores</text>
    <text x="700" y="480">✓ Relatórios</text>
  </g>
  
  <!-- CTA badge -->
  <rect x="340" y="520" width="200" height="40" rx="20" fill="#3b82f6"/>
  <text x="440" y="548" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle">7 dias grátis</text>
  
  <!-- URL -->
  <text x="1100" y="590" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20" text-anchor="end">almoxfacil.alnog.com.br</text>
</svg>

